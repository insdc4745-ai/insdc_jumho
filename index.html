<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생활반 인원보고</title>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 0;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 480px;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h2 { margin-top: 0; font-size: 18px; }

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
}

.input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #2f80ed;
    color: white;
    font-weight: bold;
}

button.delete {
    background: #eb5757;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    padding: 8px;
    text-align: center;
}

textarea {
    width: 100%;
    height: 220px;
    margin-top: 10px;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    box-sizing: border-box;
    cursor: pointer;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}
.toast.show { opacity: 1; }
</style>

</head>

<body>

<div class="container">

<!-- 설정 -->
<div class="card">
<h1>테스트용 절대 맹신금지</h1>
<h2>생활반 설정</h2>

<div class="input-group">
<div class="label">생활반 번호</div>
<input class="input" type="number" id="unitNumber">
</div>

<!-- 🔥 주말 점검 -->
<div class="input-group">
<label class="label">주말 점검</label>
<input type="checkbox" id="weekendCheck" onchange="toggleWeekend()">
</div>

<button onclick="saveUnit()">저장</button>
<button onclick="resetAll()">전체 초기화</button>
</div>

<!-- 인원 -->
<div class="card">
<h2>인원 추가</h2>

<input class="input" type="text" id="name" placeholder="이름">

<select class="input" id="rank">
<option value="병장">병장</option>
<option value="상병">상병</option>
<option value="일병">일병</option>
<option value="이병">이병</option>
</select>

<input class="input" type="text" id="unit" placeholder="소속 (본부 / 1소대 등)">

<button onclick="addPerson()">추가</button>
</div>

<!-- 상태 -->
<div class="card">
<h2>상태 설정</h2>

<table id="statusTable">
<thead>
<tr>
<th>이름</th>
<th>계급</th>
<th>점호</th>
<th>조별</th>
<th id="weekendHead" style="display:none;">주말</th>
<th>삭제</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- 보고서 -->
<div class="card">
<textarea id="output" placeholder="클릭하면 복사됩니다"></textarea>
</div>

</div>

<div id="toast" class="toast">복사됨</div>

<script>



function setCookie(n,v,d=7){
    let date=new Date();
    date.setTime(date.getTime()+d*86400000);
    document.cookie =
        `${n}=${encodeURIComponent(v)}; expires=${date.toUTCString()}; path=/`;
}

function getCookie(n){
    let c=document.cookie.split("; ")
        .find(r=>r.startsWith(n+"="));
    return c ? decodeURIComponent(c.split("=")[1]) : null;
}



let people = JSON.parse(getCookie("people") || "[]");
let statuses = JSON.parse(getCookie("statuses") || "{}");
let unitNumber = getCookie("unitNumber") || "";
let weekendEnabled = JSON.parse(getCookie("weekend") || "false");

const rankOrder = { "병장":4, "상병":3, "일병":2, "이병":1 };



function saveAll(){
    setCookie("people", JSON.stringify(people));
    setCookie("statuses", JSON.stringify(statuses));
    setCookie("unitNumber", unitNumber);
    setCookie("weekend", JSON.stringify(weekendEnabled));
}



function saveUnit(){
    unitNumber=document.getElementById("unitNumber").value;
    saveAll();
    generateReport();
}



function resetAll(){
    document.cookie="people=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie="statuses=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie="unitNumber=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie="weekend=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

    people=[];
    statuses={};
    unitNumber="";
    weekendEnabled=false;

    renderTable();
    generateReport();
}



function toggleWeekend(){
    weekendEnabled=document.getElementById("weekendCheck").checked;
    saveAll();
    renderTable();
    generateReport();
}



function addPerson(){
    const name=document.getElementById("name").value;
    const rank=document.getElementById("rank").value;
    const unit=document.getElementById("unit").value || "";

    if(!name) return alert("이름 입력");

    people.push({name,rank,unit});

    saveAll();
    renderTable();
    generateReport();
}



function deletePerson(idx){
    people.splice(idx,1);

    ["점호","조별","주말점검"].forEach(t=>{
        if(statuses[t]){
            let n={};
            Object.entries(statuses[t]).forEach(([i,v])=>{
                if(i!=idx){
                    let ni=i>idx?i-1:i;
                    n[ni]=v;
                }
            });
            statuses[t]=n;
        }
    });

    saveAll();
    renderTable();
    generateReport();
}



function createSelect(idx,type){
    const cats=["","조리","당직","작업","휴가","환자","파견","기타"];

    let html=`<select onchange="updateStatus(${idx},'${type}',this.value)">`;

    cats.forEach(c=>{
        let sel=(statuses[type]?.[idx]===c)?"selected":"";
        html+=`<option value="${c}" ${sel}>${c||"정상"}</option>`;
    });

    html+="</select>";
    return html;
}

function updateStatus(idx,type,val){
    if(!statuses[type]) statuses[type]={};
    statuses[type][idx]=val;

    saveAll();
    generateReport();
}



function renderTable(){
    const tbody=document.querySelector("#statusTable tbody");
    const weekendHead=document.getElementById("weekendHead");

    weekendHead.style.display = weekendEnabled ? "" : "none";
    document.getElementById("weekendCheck").checked = weekendEnabled;

    tbody.innerHTML="";

    people.forEach((p,idx)=>{

        let weekendCell = weekendEnabled
            ? `<td>${createSelect(idx,"주말점검")}</td>`
            : "";

        tbody.innerHTML+=`
        <tr>
        <td>${p.name}</td>
        <td>${p.rank}</td>
        <td>${createSelect(idx,"점호")}</td>
        <td>${createSelect(idx,"조별")}</td>
        ${weekendCell}
        <td><button class="delete" onclick="deletePerson(${idx})">삭제</button></td>
        </tr>`;
    });
}



function section(type){

    let total=people.length;
    let abs=0;
    let map={};

    if(statuses[type]){
        Object.entries(statuses[type]).forEach(([i,c])=>{
            if(!c) return;

            abs++;
            if(!map[c]) map[c]=[];
            map[c].push(people[i]);
        });
    }

    let txt=`\n📍${type} 인원보고\n`;
    txt+=`총원 ${total} / 부재 ${abs} / 현재원 ${total-abs}\n`;

    Object.entries(map).forEach(([cat,list])=>{

        list.sort((a,b)=>rankOrder[b.rank]-rankOrder[a.rank]);

        txt+=`-${cat}(${list.length}): `;

        let currentRank="";

        list.forEach((p,i)=>{

            let showUnit = (cat==="당직"||cat==="작업") ? `(${p.unit})` : "";

            if(p.rank!==currentRank){
                if(i!==0) txt+=", ";
                txt+=`${p.rank} ${p.name}${showUnit}`;
                currentRank=p.rank;
            } else {
                txt+=`, ${p.name}${showUnit}`;
            }
        });

        txt+="\n";
    });

    return txt;
}



function generateReport(){
    let r=`[제${unitNumber}생활반 인원보고]\n`;
    r+=section("점호");
    r+=section("조별");

    if(weekendEnabled){
        r+=section("주말점검");
    }

    document.getElementById("output").value=r;
}


document.getElementById("output").addEventListener("click",()=>{
    navigator.clipboard.writeText(
        document.getElementById("output").value
    );
    showToast();
});



function showToast(){
    let t=document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
}

/* INIT */
renderTable();
generateReport();

</script>

</body>
</html>
