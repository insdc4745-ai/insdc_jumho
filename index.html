<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생활반 인원보고</title>

<style>
body {
    font-family: Arial;
    background: #f5f6fa;
    margin: 0;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 480px;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
}

.label { font-size: 13px; color: #666; }

.input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #2f80ed;
    color: white;
    font-weight: bold;
}

button.delete { background: #eb5757; }

table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 8px; text-align: center; }

textarea {
    width: 100%;
    height: 220px;
    margin-top: 10px;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>

<body>

<div class="container">

<!-- 설정 -->
<div class="card">
<h2>생활반 설정</h2>

<div class="input-group">
<div class="label">생활반 번호</div>
<input class="input" type="number" id="unitNumber">
</div>

<button onclick="saveUnit()">저장</button>
<button onclick="resetAll()">전체 초기화</button>

</div>

<!-- 인원 -->
<div class="card">
<h2>인원 추가</h2>

<div class="input-group">
<div class="label">이름</div>
<input class="input" type="text" id="name">
</div>

<div class="input-group">
<div class="label">계급</div>
<select class="input" id="rank">
<option value="병장">병장</option>
<option value="상병">상병</option>
<option value="일병">일병</option>
<option value="이병">이병</option>
</select>
</div>

<button onclick="addPerson()">추가</button>

</div>

<!-- 상태 -->
<div class="card">
<h2>상태 설정</h2>

<table id="statusTable">
<thead>
<tr>
<th>이름</th>
<th>계급</th>
<th>점호</th>
<th>조별</th>
<th>삭제</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- 보고서 -->
<div class="card">
<textarea id="output" placeholder="클릭 시 복사"></textarea>
</div>

</div>

<div id="toast" class="toast">복사됨</div>

<script>

/* =========================
   COOKIE
========================= */

function setCookie(name, value, days=7){
    let d = new Date();
    d.setTime(d.getTime() + days*24*60*60*1000);
    document.cookie =
        name + "=" + encodeURIComponent(value) +
        "; expires=" + d.toUTCString() +
        "; path=/";
}

function getCookie(name){
    let n = name + "=";
    let arr = document.cookie.split(";");

    for(let c of arr){
        c = c.trim();
        if(c.indexOf(n) === 0){
            return decodeURIComponent(c.substring(n.length));
        }
    }
    return null;
}

/* =========================
   DATA
========================= */

let people = JSON.parse(getCookie("people") || "[]");
let statuses = JSON.parse(getCookie("statuses") || "{}");
let unitNumber = getCookie("unitNumber") || "";

/* 계급 우선순위 */
const rankOrder = {
    "병장": 4,
    "상병": 3,
    "일병": 2,
    "이병": 1
};

/* =========================
   SAVE
========================= */

function saveAll(){
    setCookie("people", JSON.stringify(people));
    setCookie("statuses", JSON.stringify(statuses));
    setCookie("unitNumber", unitNumber);
}

/* =========================
   UNIT
========================= */

function saveUnit(){
    unitNumber = document.getElementById("unitNumber").value;
    saveAll();
    generateReport();
}

/* =========================
   RESET
========================= */

function resetAll(){
    document.cookie = "people=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie = "statuses=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie = "unitNumber=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

    people = [];
    statuses = {};
    unitNumber = "";

    renderTable();
    generateReport();
}

/* =========================
   PEOPLE
========================= */

function addPerson(){
    const name = document.getElementById("name").value;
    const rank = document.getElementById("rank").value;

    if(!name) return alert("이름 입력");

    people.push({name, rank});
    saveAll();

    renderTable();
    generateReport();
}

function deletePerson(idx){
    people.splice(idx,1);

    ["점호","조별"].forEach(t=>{
        if(statuses[t]){
            let n = {};
            Object.entries(statuses[t]).forEach(([i,v])=>{
                if(i != idx){
                    let ni = i > idx ? i-1 : i;
                    n[ni] = v;
                }
            });
            statuses[t] = n;
        }
    });

    saveAll();
    renderTable();
    generateReport();
}

/* =========================
   SELECT
========================= */

function createSelect(idx,type){
    const cats=["","조리","당직","작업","휴가","환자","파견","기타"];

    let html=`<select onchange="updateStatus(${idx},'${type}',this.value)">`;

    cats.forEach(c=>{
        let sel = (statuses[type] && statuses[type][idx] === c) ? "selected" : "";
        html += `<option value="${c}" ${sel}>${c||"정상"}</option>`;
    });

    html += "</select>";
    return html;
}

/* =========================
   STATUS UPDATE
========================= */

function updateStatus(idx,type,val){
    if(!statuses[type]) statuses[type] = {};
    statuses[type][idx] = val;

    saveAll();
    generateReport();
}

/* =========================
   TABLE
========================= */

function renderTable(){

    const tbody = document.querySelector("#statusTable tbody");
    tbody.innerHTML = "";

    people.forEach((p,idx)=>{

        let row = document.createElement("tr");

        row.innerHTML = `
        <td>${p.name}</td>
        <td>${p.rank}</td>
        <td>${createSelect(idx,"점호")}</td>
        <td>${createSelect(idx,"조별")}</td>
        <td><button class="delete" onclick="deletePerson(${idx})">삭제</button></td>
        `;

        tbody.appendChild(row);
    });
}

/* =========================
   REPORT (핵심 수정 복구)
========================= */

function section(type){

    let total = people.length;
    let absent = 0;
    let map = {};

    if(statuses[type]){
        Object.entries(statuses[type]).forEach(([i,c])=>{
            if(c){
                absent++;
                if(!map[c]) map[c] = [];
                map[c].push(people[i]);
            }
        });
    }

    let txt = `\n📍${type} 인원보고\n`;
    txt += `총원 ${total} / 부재 ${absent} / 현재원 ${total-absent}\n`;

    Object.entries(map).forEach(([cat,list])=>{

        // 계급 정렬
        list.sort((a,b)=>rankOrder[b.rank]-rankOrder[a.rank]);

        txt += `-${cat}(${list.length}): `;

        let currentRank = "";

        list.forEach((p,i)=>{
            if(p.rank !== currentRank){
                if(i !== 0) txt += ", ";
                txt += `${p.rank} ${p.name}`;
                currentRank = p.rank;
            } else {
                txt += `, ${p.name}`;
            }
        });

        txt += "\n";
    });

    return txt;
}

/* =========================
   REPORT GENERATE
========================= */

function generateReport(){
    let r = `[제${unitNumber}생활반 인원보고]\n`;
    r += section("점호");
    r += section("조별");

    document.getElementById("output").value = r;
}

/* =========================
   COPY ONLY ON CLICK
========================= */

document.getElementById("output").addEventListener("click",()=>{
    let text = document.getElementById("output").value;
    if(!text) return;

    navigator.clipboard.writeText(text);
    showToast();
});

/* =========================
   TOAST
========================= */

function showToast(){
    let t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
}

/* INIT */
renderTable();
generateReport();

</script>

</body>
</html>
